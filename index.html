<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Zen Posture Pro Analytics</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ml5@1.2.1/dist/ml5.min.js"></script>
    <style>
        body { 
            background: #050508; color: #e0e0e0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center; 
        }
        
        .header { text-align: center; margin-bottom: 20px; }
        h1 { color: #00ff88; margin: 0 0 10px 0; text-shadow: 0 0 15px rgba(0,255,136,0.2); letter-spacing: 2px; }
        
        #btn-start { 
            background: linear-gradient(135deg, #00ff88, #00cc6e); 
            color: #050508; border: none; padding: 15px 40px; 
            font-size: 1.1rem; font-weight: bold; border-radius: 50px; 
            cursor: pointer; box-shadow: 0 5px 20px rgba(0,255,136,0.3);
            transition: transform 0.2s;
        }
        #btn-start:hover { transform: scale(1.05); }
        
        #status-msg { margin-top: 15px; font-size: 1rem; color: #888; font-style: italic; }

        .dashboard { 
            display: flex; gap: 30px; flex-wrap: wrap; justify-content: center; 
            max-width: 1000px; width: 100%;
        }

        #camera-wrapper { 
            border: 3px solid #1a1a2e; border-radius: 20px; 
            overflow: hidden; background: #000; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 640px; height: 480px;
            position: relative;
        }

        .panel { display: flex; flex-direction: column; gap: 20px; width: 300px; }

        .card { 
            background: #111122; border-radius: 15px; padding: 25px; 
            border-left: 5px solid #333; /* Culoare default */
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
            transition: all 0.3s ease;
        }
        .card.ok { border-left-color: #00ff88; }
        .card.bad { border-left-color: #ff4444; background: #1a1122; }

        .lbl { font-size: 0.85rem; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .val { font-size: 1.6rem; font-weight: bold; color: #fff; }
        .val.ok { color: #00ff88; }
        .val.bad { color: #ff4444; }
    </style>
</head>
<body>

    <div class="header">
        <h1>ZEN POSTURE <span style="color:white">PRO</span></h1>
        <button id="btn-start" onclick="initSistem()">INIȚIALIZARE SISTEM</button>
        <div id="status-msg">Așteptare comandă utilizator...</div>
    </div>
    
    <div class="dashboard">
        <div id="camera-wrapper"></div>
        
        <div class="panel">
            <div class="card" id="c-scor">
                <div class="lbl">Scor Sănătate Zilnic</div>
                <div id="v-scor" class="val">0%</div>
            </div>
            
            <div class="card" id="c-gat">
                <div class="lbl">Tensiune Cervicală (Gât)</div>
                <div id="v-gat" class="val">---</div>
            </div>
            
            <div class="card" id="c-ochi">
                <div class="lbl">Distanță Monitor</div>
                <div id="v-ochi" class="val">---</div>
            </div>
        </div>
    </div>

    <script>
        let video;
        let bodyPose;
        let poses = [];
        let cadreCorecte = 0;
        let cadreTotale = 0;

        // Limite de sensibilitate (le poți ajusta ulterior)
        const PRAG_POSTURA = 55;  // Mai mare = mai strict cu spatele drept
        const PRAG_DISTANTA = 110; // Mai mic = trebuie să stai mai departe de ecran

        function setup() {
            let cnv = createCanvas(640, 480);
            cnv.parent('camera-wrapper');
        }

        function initSistem() {
            document.getElementById('btn-start').style.display = 'none';
            document.getElementById('status-msg').innerText = "Pas 1: Se conectează camera...";
            
            video = createCapture(VIDEO, () => {
                document.getElementById('status-msg').innerText = "Pas 2: Se descarcă modelul AI (te rog așteaptă)...";
                document.getElementById('camera-wrapper').style.borderColor = "#ffaa00"; // Feedback vizual de așteptare
                
                bodyPose = ml5.bodyPose(() => {
                    document.getElementById('status-msg').innerText = "SISTEM ACTIV. MONITORIZARE LIVE ✅";
                    document.getElementById('status-msg').style.color = "#00ff88";
                    document.getElementById('camera-wrapper').style.borderColor = "#00ff88"; // Feedback vizual de succes
                    
                    bodyPose.detectStart(video, (results) => {
                        poses = results;
                    });
                });
            });
            video.size(640, 480);
            video.hide();
        }

        function draw() {
            background(0);
            
            // Desenăm feed-ul video
            if (video && video.loadedmetadata) {
                image(video, 0, 0, 640, 480);
            }

            // Analizăm postura
            if (poses.length > 0) {
                let p = poses[0];
                
                // Verificare de siguranță: facem calcule doar dacă vedem toate punctele necesare
                if (p.nose && p.left_shoulder && p.right_shoulder && p.left_eye && p.right_eye) {
                    cadreTotale++;
                    
                    // 1. Calcul Postură Gât
                    let centruUmeriY = (p.left_shoulder.y + p.right_shoulder.y) / 2;
                    let distantaGat = centruUmeriY - p.nose.y;
                    let gatCorect = distantaGat > PRAG_POSTURA;
                    
                    // 2. Calcul Distanță Ecran (distanța între ochi)
                    let distantaOchi = dist(p.left_eye.x, p.left_eye.y, p.right_eye.x, p.right_eye.y);
                    let distantaCorecta = distantaOchi < PRAG_DISTANTA;

                    // Scor Global
                    if (gatCorect && distantaCorecta) {
                        cadreCorecte++;
                    }

                    // --- ACTUALIZARE INTERFAȚĂ (DASHBOARD) ---
                    
                    // Update Scor
                    let scorCurent = Math.floor((cadreCorecte / cadreTotale) * 100);
                    document.getElementById('v-scor').innerText = scorCurent + "%";
                    document.getElementById('c-scor').className = scorCurent > 80 ? "card ok" : "card bad";
                    document.getElementById('v-scor').className = scorCurent > 80 ? "val ok" : "val bad";

                    // Update Card Gât
                    actualizeazaCard('c-gat', 'v-gat', gatCorect, "OPTIMĂ", "APLECAT ⚠️");
                    
                    // Update Card Distanță
                    actualizeazaCard('c-ochi', 'v-ochi', distantaCorecta, "SIGURĂ", "PREA APROAPE 🚨");

                    // --- FEEDBACK VIZUAL PE VIDEO ---
                    
                    // Linia umerilor
                    stroke(gatCorect ? "#00ff88" : "#ff4444");
                    strokeWeight(6);
                    line(p.left_shoulder.x, p.left_shoulder.y, p.right_shoulder.x, p.right_shoulder.y);

                    // Avertizare ochi (cercuri roșii dacă ești prea aproape)
                    if (!distantaCorecta) {
                        noFill();
                        stroke("#ff4444");
                        strokeWeight(4);
                        ellipse(p.left_eye.x, p.left_eye.y, 40);
                        ellipse(p.right_eye.x, p.right_eye.y, 40);
                    }
                }
            }
        }

        // Funcție ajutătoare pentru a schimba culorile și textul cardurilor
        function actualizeazaCard(idCard, idValoare, esteOk, textOk, textBad) {
            let card = document.getElementById(idCard);
            let val = document.getElementById(idValoare);
            
            card.className = esteOk ? "card ok" : "card bad";
            val.className = esteOk ? "val ok" : "val bad";
            val.innerText = esteOk ? textOk : textBad;
        }
    </script>
</body>
</html>
