<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Zen Posture Pro - Stable Initialization</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ml5@1.2.1/dist/ml5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        body { background: #050508; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        .header { text-align: center; margin-bottom: 15px; }
        h1 { color: #00ff88; margin: 0 0 10px 0; text-shadow: 0 0 15px rgba(0,255,136,0.2); letter-spacing: 2px; }
        
        .controale { display: flex; gap: 10px; justify-content: center; margin-bottom: 15px; flex-wrap: wrap; max-width: 1000px; }
        button { border: none; padding: 10px 15px; font-size: 0.9rem; font-weight: bold; border-radius: 50px; cursor: pointer; transition: 0.3s; }
        #btn-start { background: linear-gradient(135deg, #00ff88, #00cc6e); color: #000; box-shadow: 0 5px 20px rgba(0,255,136,0.3); font-size: 1rem; padding: 12px 25px; }
        #btn-start:hover { transform: scale(1.05); }
        
        .btn-sec { background: #333; color: #fff; display: none; }
        .btn-sec:hover { background: #444; transform: scale(1.05); }
        #btn-audio.activ { background: #00ff88; color: #000; }
        #btn-pip { background: #00b8ff; color: #000; box-shadow: 0 5px 20px rgba(0,184,255,0.3); }
        #btn-analytics { background: #ffaa00; color: #000; box-shadow: 0 5px 20px rgba(255,170,0,0.3); }
        #btn-calib { background: #ff00ff; color: #fff; box-shadow: 0 5px 20px rgba(255,0,255,0.3); }
        #btn-pauza { background: #555; color: #fff; border: 2px solid #777; }
        #btn-pauza.in-pauza { background: #ffaa00; color: #000; box-shadow: 0 5px 20px rgba(255,170,0,0.4); border-color: #ffaa00; animation: pulse 2s infinite; }
        #btn-exercitii { background: #00ffcc; color: #000; box-shadow: 0 5px 20px rgba(0,255,204,0.4); }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        #status-msg { margin-top: 5px; font-size: 1rem; color: #888; font-style: italic; font-weight: bold; }

        .dashboard { display: flex; gap: 30px; flex-wrap: wrap; justify-content: center; max-width: 1100px; width: 100%; align-items: flex-start; }

        #camera-wrapper { border: 2px solid rgba(0, 255, 136, 0.7); box-shadow: 0 0 30px rgba(0, 255, 136, 0.4); border-radius: 20px; overflow: hidden; background: #000; width: 640px; height: 480px; position: relative; z-index: 1;}
        #camera-wrapper canvas { display: block; position: relative; z-index: 2; }
        /* Aici ascundem elementul video generat de p5.js, lăsând doar canvas-ul */
        video { display: none !important; } 

        .panel { display: flex; flex-direction: column; gap: 15px; width: 280px; max-height: 480px; overflow-y: auto; padding-right: 5px; position: relative; z-index: 100; }
        .panel::-webkit-scrollbar { width: 6px; }
        .panel::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        .card { background: #111122; border-radius: 12px; padding: 15px 20px; border-left: 5px solid #333; box-shadow: 0 4px 15px rgba(0,0,0,0.5); transition: 0.3s; position: relative; }
        .card.ok { border-left-color: #00ff88; }
        .card.bad { border-left-color: #ff4444; background: #1a111a; }
        .card.warn { border-left-color: #ffaa00; background: #221a11; }
        .card.info { border-left-color: #00b8ff; }
        
        .lbl { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; display: flex; align-items: center; justify-content: space-between; }
        .val { font-size: 1.3rem; font-weight: bold; color: #fff; }
        .val.ok { color: #00ff88; }
        .val.bad { color: #ff4444; }
        .val.warn { color: #ffaa00; }
        .val.info { color: #00b8ff; }

        .info-icon { cursor: help; font-size: 1.2rem; color: #00b8ff; opacity: 0.7; transition: 0.3s; display: inline-block; padding: 5px;}
        .info-icon:hover { opacity: 1; transform: scale(1.1); }
        .tooltip-content { display: none; }

        #global-tooltip { position: fixed; z-index: 999999; background: #0b0b14; border: 2px solid #00b8ff; border-radius: 12px; padding: 18px; box-shadow: 0 20px 60px rgba(0,0,0,0.9); color: #e0e0e0; font-size: 0.95rem; width: 320px; pointer-events: none; opacity: 0; visibility: hidden; transition: opacity 0.2s ease-in-out; line-height: 1.5; }
        #global-tooltip h4 { margin: 0 0 10px 0; color: #00ff88; font-size: 1.05rem; border-bottom: 1px solid #333; padding-bottom: 5px;}
        #global-tooltip strong { color: #fff; display: inline-block; margin-top: 8px; }

        .modal-overlay { display: none; position: absolute; top: 0; left: 0; width: 640px; height: 480px; background: rgba(5,5,8,0.9); z-index: 200; flex-direction: column; justify-content: center; align-items: center; text-align: center; border-radius: 20px; backdrop-filter: blur(8px); }
        .modal-titlu { color: #ffaa00; font-size: 2rem; font-weight: bold; margin-bottom: 15px; }
        .btn-raspuns { padding: 15px 30px; font-size: 1.1rem; margin: 10px; border-radius: 10px; cursor: pointer; border: none; font-weight: bold; transition: 0.2s;}
        .btn-raspuns:hover { transform: scale(1.05); }

        #modal-analytics { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; overflow-y: auto; padding: 20px 0; backdrop-filter: blur(10px); }
        #raport-printabil { background: rgba(15, 15, 25, 0.95); border: 1px solid rgba(255,255,255,0.1); border-radius: 25px; padding: 40px; width: 90%; max-width: 950px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.8); margin: auto; position: relative; }
        .header-raport { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px; margin-bottom: 20px; }
        .header-raport h2 { color: #fff; margin: 0; font-size: 1.8rem; display: flex; align-items: center; gap: 10px; }
        .header-raport .badge { background: #00ff88; color: #000; padding: 5px 15px; border-radius: 20px; font-size: 0.9rem; font-weight: bold; }

        .stats-grid { display: flex; justify-content: space-between; gap: 15px; margin: 20px 0; flex-wrap: wrap; }
        .stat-box { background: linear-gradient(145deg, rgba(30,30,45,0.8), rgba(20,20,30,0.8)); padding: 20px; border-radius: 20px; flex: 1; min-width: 140px; text-align: left; border: 1px solid rgba(255,255,255,0.05); position: relative; }
        .stat-val { font-size: 2.2rem; font-weight: 800; color: #fff; display: block; margin-bottom: 5px; }
        .stat-lbl { font-size: 0.8rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .grade-circle { position: absolute; top: 15px; right: 15px; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: bold; background: rgba(0,0,0,0.3); border: 2px solid; }

        .charts-layout { display: flex; gap: 20px; margin-top: 30px; flex-wrap: wrap; }
        .chart-history { flex: 2; min-width: 300px; height: 280px; background: rgba(20,20,30,0.5); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .chart-doughnut { flex: 1; min-width: 200px; height: 280px; background: rgba(20,20,30,0.5); border-radius: 20px; padding: 20px; display: flex; flex-direction: column; align-items: center; border: 1px solid rgba(255,255,255,0.05);}
        
        .insights-box { background: rgba(0, 184, 255, 0.1); padding: 25px; border-radius: 20px; margin-top: 30px; text-align: left; border-left: 5px solid #00b8ff; font-size: 1.15rem; line-height: 1.6; color: #ddd; transition: transform 0.2s ease-out; }
        .actions-raport { display: flex; gap: 15px; justify-content: center; margin-top: 30px; }
        #btn-export { background: #fff; color: #000; }
    </style>
</head>
