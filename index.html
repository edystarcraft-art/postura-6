<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Zen Posture Pro Fix</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ml5@1.2.1/dist/ml5.min.js"></script>
    <style>
        body { background: #050508; color: #fff; font-family: sans-serif; text-align: center; }
        #canvas-holder { border: 4px solid #333; margin: 20px auto; width: 640px; height: 480px; display: block; }
        .info { color: #0f8; font-size: 1.2rem; margin: 10px; }
    </style>
</head>
<body>
    <h1>ZEN POSTURE FIX</h1>
    <p id="msg" class="info">Apasă tasta "S" pentru a porni camera dacă nu pornește automat</p>
    <div id="canvas-holder"></div>

    <script>
        let video, bPose, poses = [];

        function setup() {
            let cnv = createCanvas(640, 480);
            cnv.parent('canvas-holder');
            
            // Încercăm pornirea automată
            startCam();
        }

        function startCam() {
            video = createCapture(VIDEO, (stream) => {
                if(stream) {
                    document.getElementById('msg').innerText = "Cameră activă! Se încarcă AI...";
                    bPose = ml5.bodyPose(video, () => {
                        document.getElementById('msg').innerText = "SISTEM ACTIV ✅";
                        bPose.detectStart(video, r => { poses = r; });
                    });
                }
            });
            video.size(640, 480);
            video.hide();
        }

        function keyPressed() {
            if (key === 's' || key === 'S') startCam();
        }

        function draw() {
            background(0);
            if (video) image(video, 0, 0, 640, 480);
            
            if (poses.length > 0) {
                let p = poses[0];
                if (p.nose && p.left_shoulder) {
                    let dV = p.left_shoulder.y - p.nose.y;
                    let pOk = dV > 80;
                    stroke(pOk ? "#0f8" : "#f44");
                    strokeWeight(10);
                    line(p.left_shoulder.x, p.left_shoulder.y, p.right_shoulder.x, p.right_shoulder.y);
                }
            }
        }
    </script>
</body>
</html>
