<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Zen Posture Pro - Premium Clear</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ml5@1.2.1/dist/ml5.min.js"></script>
    <style>
        body { background: #050508; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; margin-bottom: 20px; }
        h1 { color: #00ff88; margin: 0 0 10px 0; text-shadow: 0 0 15px rgba(0,255,136,0.2); letter-spacing: 2px; }
        
        .controale { display: flex; gap: 10px; justify-content: center; margin-bottom: 15px; flex-wrap: wrap; max-width: 800px; }
        button { border: none; padding: 10px 20px; font-size: 0.9rem; font-weight: bold; border-radius: 50px; cursor: pointer; transition: 0.3s; }
        #btn-start { background: linear-gradient(135deg, #00ff88, #00cc6e); color: #000; box-shadow: 0 5px 20px rgba(0,255,136,0.3); font-size: 1rem; padding: 12px 25px; }
        #btn-start:hover { transform: scale(1.05); }
        
        .btn-sec { background: #333; color: #fff; display: none; }
        .btn-sec:hover { background: #444; }
        #btn-audio.activ { background: #00ff88; color: #000; }
        #btn-pip { background: #00b8ff; color: #000; box-shadow: 0 5px 20px rgba(0,184,255,0.3); }
        #btn-analytics { background: #ffaa00; color: #000; box-shadow: 0 5px 20px rgba(255,170,0,0.3); }
        #btn-calib { background: #ff00ff; color: #fff; box-shadow: 0 5px 20px rgba(255,0,255,0.3); }

        #status-msg { margin-top: 5px; font-size: 1rem; color: #888; font-style: italic; font-weight: bold; }

        .dashboard { display: flex; gap: 30px; flex-wrap: wrap; justify-content: center; max-width: 1000px; width: 100%; }

        #camera-wrapper { border: 2px solid rgba(0, 255, 136, 0.7); box-shadow: 0 0 30px rgba(0, 255, 136, 0.4); border-radius: 20px; overflow: hidden; background: #000; width: 640px; height: 480px; position: relative; }
        #camera-wrapper canvas { display: block; position: relative; z-index: 2; }
        /* Fără blur pe video aici. Este clar. */
        #camera-wrapper video.feed { display: none; }

        .panel { display: flex; flex-direction: column; gap: 20px; width: 300px; }
        .card { background: #111122; border-radius: 15px; padding: 25px; border-left: 5px solid #333; box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: 0.3s; }
        .card.ok { border-left-color: #00ff88; }
        .card.bad { border-left-color: #ff4444; background: #1a1122; }
        .lbl { font-size: 0.85rem; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .val { font-size: 1.6rem; font-weight: bold; color: #fff; }
        .val.ok { color: #00ff88; }
        .val.bad { color: #ff4444; }

        /* --- STILURI MODAL ZEN BREAK --- */
        #modal-zen { display: none; position: absolute; top: 0; left: 0; width: 640px; height: 480px; background: rgba(5,5,8,0.7); z-index: 10; flex-direction: column; justify-content: center; align-items: center; text-align: center; border-radius: 20px; }
        .zen-title { color: #00b8ff; font-size: 2rem; font-weight: bold; margin-bottom: 10px; text-shadow: 0 0 20px rgba(0,184,255,0.5); }
        .zen-text { color: #e0e0e0; font-size: 1.2rem; margin-bottom: 30px; max-width: 80%; }
        .zen-timer { font-size: 4rem; color: #00ff88; font-weight: bold; font-variant-numeric: tabular-nums; }
        
        /* Modal Analytics */
        #modal-analytics { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5,5,8,0.95); z-index: 999; justify-content: center; align-items: center; }
        .modal-content { background: #111122; border: 2px solid #ffaa00; border-radius: 20px; padding: 30px; width: 90%; max-width: 700px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .chart-container { display: flex; justify-content: space-evenly; align-items: flex-end; height: 250px; margin-top: 30px; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .bar-wrapper { display: flex; flex-direction: column; align-items: center; gap: 10px; width: 50px; }
        .bar { width: 100%; background: linear-gradient(0deg, #006633, #00ff88); border-radius: 5px 5px 0 0; }
        .bar.low { background: linear-gradient(0deg, #660000, #ff4444); }
        .bar-label { font-size: 0.8rem; color: #aaa; }
        .bar-score { font-size: 1rem; font-weight: bold; color: #fff; }
    </style>
</head>
<body>

    <div class="header">
        <h1>ZEN POSTURE <span style="color:white">PRO</span></h1>
        
        <div class="controale">
            <button id="btn-start" onclick="initSistem()">1. INIȚIALIZARE SISTEM</button>
            <button id="btn-audio" class="btn-sec activ" onclick="toggleAudio()">🔔 ALARME: ON</button>
            <button id="btn-pip" class="btn-sec" onclick="activeazaModFundal()">📺 PIP (FUNDAL)</button>
            <button id="btn-analytics" class="btn-sec" onclick="deschideAnalytics()">📊 RAPORT</button>
            <button id="btn-calib" class="btn-sec" onclick="pornesteCalibrare()">🎯 CALIBRARE AI</button>
            <button id="btn-zen" class="btn-sec" onclick="declanseazaZenBreak()" style="background:#00b8ff; color:black;">🧘 TEST ZEN BREAK</button>
        </div>
        
        <div id="status-msg">Apasă butonul pentru a porni AI-ul.</div>
    </div>
    
    <div class="dashboard">
        <div id="camera-wrapper">
            <div id="modal-zen">
                <div class="zen-title">Pauză de Sănătate</div>
                <div class="zen-text">Ai stat aplecat prea mult timp.<br>Relaxează-ți umerii, respiră adânc și privește la distanță.</div>
                <div class="zen-timer" id="zen-countdown">60</div>
            </div>
        </div>
        
        <div class="panel">
            <div class="card" id="c-scor"><div class="lbl">Scor Zilnic</div><div id="v-scor" class="val">0%</div></div>
            <div class="card" id="c-gat"><div class="lbl">Postură Cervicală</div><div id="v-gat" class="val">---</div></div>
            <div class="card" id="c-ochi"><div class="lbl">Distanță Monitor</div><div id="v-ochi" class="val">---</div></div>
        </div>
    </div>

    <video id="pip-video" muted autoplay playsinline style="display:none;"></video>

    <div id="modal-analytics">
        <div class="modal-content">
            <h2 style="color:#ffaa00; margin-top:0;">Evoluția Sănătății Tale</h2>
            <div class="chart-container" id="chart-area"></div>
            <button class="btn-sec" style="display:inline-block; margin-top:30px;" onclick="inchideAnalytics()">Închide Raportul</button>
        </div>
    </div>

    <script>
        let video, bodyPose, poses = [];
        let cadreCorecte = 0, cadreTotale = 0;
        let contextAudio = null, alarmeActive = true, ultimulAvertisment = 0; 
        const COOLDOWN_NOTIFICARE = 6000; 
        
        // Memorie Calibrare
        let PRAG_POSTURA = localStorage.getItem('zenPragGat') ? parseInt(localStorage.getItem('zenPragGat')) : 75;  
        let PRAG_DISTANTA = localStorage.getItem('zenPragOchi') ? parseInt(localStorage.getItem('zenPragOchi')) : 65; 
        
        let modCalibrare = false;
        let dateCalibrare = [];

        // Zen Break
        let cadreGresiteConsecutive = 0;
        let esteInZenBreak = false;
        let timerInterval = null;

        let pipVideoElement;
        let dataCurenta = new Date().toLocaleDateString('ro-RO');
        let bannerVizual = "", timerBanner = 0;

        function setup() {
            let cnv = createCanvas(640, 480);
            cnv.parent('camera-wrapper');
            pipVideoElement = document.getElementById('pip-video');
            pipVideoElement.srcObject = cnv.elt.captureStream(30);

            // Populam date demo pentru prima vizita
            if (!localStorage.getItem('zenPostureHistory')) {
                localStorage.setItem('zenPostureHistory', JSON.stringify({"Luni": 65, "Marți": 72, "Miercuri": 88}));
            }
        }

        function initSistem() {
            document.getElementById('btn-start').style.display = 'none';
            document.getElementById('status-msg').innerText = "Permite accesul camerei...";

            try {
                window.AudioContext = window.AudioContext || window.webkitAudioContext;
                contextAudio = new AudioContext();
                let silentOsc = contextAudio.createOscillator();
                let silentGain = contextAudio.createGain();
                silentGain.gain.value = 0.0001; 
                silentOsc.connect(silentGain); silentGain.connect(contextAudio.destination);
                silentOsc.start();
            } catch (e) {}
            
            video = createCapture(VIDEO, () => {
                document.getElementById('status-msg').innerText = "AI-ul se descarcă...";
                video.addClass('feed'); 
                
                bodyPose = ml5.bodyPose(() => {
                    document.getElementById('status-msg').innerText = `SISTEM ACTIV ✅ (Calibrat: Gât ${PRAG_POSTURA}px, Ochi ${PRAG_DISTANTA}px)`;
                    document.getElementById('status-msg').style.color = "#00ff88";
                    
                    let btns = document.getElementsByClassName('btn-sec');
                    for(let i=0; i<btns.length; i++) btns[i].style.display = 'block';
                    
                    pipVideoElement.play();
                    bodyPose.detectStart(video, (results) => { poses = results; });
                    setInterval(salveazaProgresul, 5000);
                });
            });
            video.size(640, 480);
            video.hide(); 
        }

        function pornesteCalibrare() {
            modCalibrare = true;
            dateCalibrare = [];
            document.getElementById('status-msg').innerText = "🔄 CALIBRARE: Stai drept și privește ecranul!";
            document.getElementById('status-msg').style.color = "#ff00ff";
        }

        function finalizeazaCalibrare() {
            modCalibrare = false;
            let sumaGat = 0, sumaOchi = 0;
            for(let i = 0; i < dateCalibrare.length; i++) {
                sumaGat += dateCalibrare[i].gat;
                sumaOchi += dateCalibrare[i].ochi;
            }
            let medieGat = sumaGat / dateCalibrare.length;
            let medieOchi = sumaOchi / dateCalibrare.length;

            PRAG_POSTURA = Math.floor(medieGat * 0.85); 
            PRAG_DISTANTA = Math.floor(medieOchi * 1.20); 
            
            localStorage.setItem('zenPragGat', PRAG_POSTURA);
            localStorage.setItem('zenPragOchi', PRAG_DISTANTA);

            document.getElementById('status-msg').innerText = `CALIBRARE COMPLETĂ ✅ Noi limite salvate!`;
            document.getElementById('status-msg').style.color = "#00ff88";
        }

        function declanseazaZenBreak() {
            if (esteInZenBreak) return;
            esteInZenBreak = true;
            cadreGresiteConsecutive = 0; 
            
            document.getElementById('modal-zen').style.display = "flex";
            let timerBox = document.getElementById('zen-countdown');
            let secundeRamase = 60;
            timerBox.innerText = secundeRamase;

            timerInterval = setInterval(() => {
                secundeRamase--;
                timerBox.innerText = secundeRamase;
                if(secundeRamase <= 0) {
                    clearInterval(timerInterval);
                    esteInZenBreak = false;
                    document.getElementById('modal-zen').style.display = "none";
                }
            }, 1000);
        }

        function draw() {
            background(0);
            
            if (video && video.loadedmetadata) {
                push();
                // Desenăm feed-ul camerei CLAR (fără blur)
                image(video, 0, 0, 640, 480);
                
                // Aplicăm blur DOAR dacă suntem în pauza Zen Break, pentru a face textul lizibil
                if (esteInZenBreak) {
                    filter(BLUR, 20);
                }
                pop();
            }

            // Oprim analizele dacă suntem în pauză
            if (esteInZenBreak) return; 

            if (poses.length > 0) {
                let p = poses[0];
                if (p.nose && p.left_shoulder && p.right_shoulder && p.left_eye && p.right_eye) {
                    
                    let centruUmeriX = (p.left_shoulder.x + p.right_shoulder.x) / 2;
                    let centruUmeriY = (p.left_shoulder.y + p.right_shoulder.y) / 2;
                    let distantaGat = centruUmeriY - p.nose.y;
                    let distantaOchi = dist(p.left_eye.x, p.left_eye.y, p.right_eye.x, p.right_eye.y);

                    // LOGICA CALIBRARE
                    if (modCalibrare) {
                        dateCalibrare.push({gat: distantaGat, ochi: distantaOchi});
                        if (dateCalibrare.length > 90) { // aprox 3 secunde
                            finalizeazaCalibrare();
                        }
                        fill(255, 0, 255); noStroke(); textSize(30); textAlign(CENTER);
                        text("Se scanează corpul...", 320, 240);
                        return; 
                    }

                    cadreTotale++;
                    let gatCorect = distantaGat > PRAG_POSTURA;
                    let distantaCorecta = distantaOchi < PRAG_DISTANTA;

                    if (gatCorect && distantaCorecta) {
                        cadreCorecte++;
                        cadreGresiteConsecutive = 0; 
                    } else {
                        cadreGresiteConsecutive++;
                        // Daca a acumulat prea multe secunde de aplecare, declansam pauza
                        if (cadreGresiteConsecutive > 450) { 
                            declanseazaZenBreak();
                            return;
                        }

                        if (!gatCorect) declanseazaAlarma('gat');
                        else if (!distantaCorecta) declanseazaAlarma('distanta');
                    }

                    // --- DASHBOARD UI ---
                    let scorCurent = Math.floor((cadreCorecte / cadreTotale) * 100);
                    document.getElementById('v-scor').innerText = scorCurent + "%";
                    document.getElementById('c-scor').className = scorCurent > 80 ? "card ok" : "card bad";
                    document.getElementById('v-scor').className = scorCurent > 80 ? "val ok" : "val bad";

                    document.getElementById('c-gat').className = gatCorect ? "card ok" : "card bad";
                    document.getElementById('v-gat').className = gatCorect ? "val ok" : "val bad";
                    document.getElementById('v-gat').innerText = gatCorect ? "OPTIMĂ" : "APLECAT ⚠️";

                    document.getElementById('c-ochi').className = distantaCorecta ? "card ok" : "card bad";
                    document.getElementById('v-ochi').className = distantaCorecta ? "val ok" : "val bad";
                    document.getElementById('v-ochi').innerText = distantaCorecta ? "SIGURĂ" : "PREA APROAPE 🚨";

                    // --- DESEN SCHELET ---
                    stroke(gatCorect ? "#00ff88" : "#ff4444"); strokeWeight(6);
                    line(p.left_shoulder.x, p.left_shoulder.y, p.right_shoulder.x, p.right_shoulder.y);

                    stroke(gatCorect ? "#00ff88" : "#ffaa00"); strokeWeight(4);
                    line(p.nose.x, p.nose.y, centruUmeriX, centruUmeriY);

                    noStroke(); fill(255); textSize(24); textStyle(BOLD); textAlign(LEFT);
                    text(Math.floor(distantaGat) + " px", centruUmeriX + 15, centruUmeriY - 20);

                    if (!distantaCorecta) {
                        noFill(); stroke("#ff4444"); strokeWeight(4);
                        ellipse(p.left_eye.x, p.left_eye.y, 40); ellipse(p.right_eye.x, p.right_eye.y, 40);
                    }
                }
            }
            
            // --- ALERTĂ VIZUALĂ (BANNER ROȘU) ---
            if (bannerVizual !== "" && millis() - timerBanner < 4000) { 
                push(); rectMode(CENTER); fill(255, 68, 68, 220); noStroke(); rect(320, 60, 480, 60, 15); 
                fill(255); textSize(26); textAlign(CENTER, CENTER); textStyle(BOLD); text(bannerVizual, 320, 60); pop(); 
            }
        }

        // --- ANALYTICS ---
        function salveazaProgresul() {
            if (cadreTotale < 50) return; 
            let scor = Math.floor((cadreCorecte / cadreTotale) * 100);
            let is = JSON.parse(localStorage.getItem('zenPostureHistory')) || {};
            is[dataCurenta] = scor;
            localStorage.setItem('zenPostureHistory', JSON.stringify(is));
        }

        function deschideAnalytics() {
            let is = JSON.parse(localStorage.getItem('zenPostureHistory')) || {};
            let chart = document.getElementById('chart-area'); chart.innerHTML = ""; 
            for (const [z, s] of Object.entries(is)) {
                let cls = s < 80 ? "bar low" : "bar"; 
                chart.innerHTML += `<div class="bar-wrapper"><div class="bar-score">${s}%</div><div class="${cls}" style="height: ${s * 2}px;"></div><div class="bar-label">${z === dataCurenta ? "Azi" : z}</div></div>`;
            }
            document.getElementById('modal-analytics').style.display = "flex";
        }

        function inchideAnalytics() { document.getElementById('modal-analytics').style.display = "none"; }
        
        async function activeazaModFundal() {
            try { if (document.pictureInPictureElement) await document.exitPictureInPicture(); else await pipVideoElement.requestPictureInPicture(); } catch (e) { alert("Eroare mod PIP."); }
        }

        // --- SUNETE & ALARME ---
        function declanseazaAlarma(tipEroare) {
            if (!alarmeActive) return;
            if (millis() - ultimulAvertisment < COOLDOWN_NOTIFICARE) return; 
            ultimulAvertisment = millis();
            
            bannerVizual = tipEroare === 'gat' ? "⚠️ ÎNDREAPTĂ SPATELE!" : "🚨 PREA APROAPE!";
            timerBanner = millis(); 
            
            try {
                if (contextAudio && contextAudio.state === 'suspended') contextAudio.resume();
                let o = contextAudio.createOscillator(); let v = contextAudio.createGain();
                o.connect(v); v.connect(contextAudio.destination);
                o.type = tipEroare === 'gat' ? 'sine' : 'triangle'; o.frequency.value = tipEroare === 'gat' ? 350 : 600; 
                v.gain.setValueAtTime(0.1, contextAudio.currentTime); v.gain.exponentialRampToValueAtTime(0.001, contextAudio.currentTime + 0.3); 
                o.start(); o.stop(contextAudio.currentTime + 0.3);
            } catch (e) {}
        }

        function toggleAudio() {
            alarmeActive = !alarmeActive;
            let btn = document.getElementById('btn-audio');
            btn.className = alarmeActive ? "btn-sec activ" : "btn-sec";
            btn.innerText = alarmeActive ? "🔔 ALARME: ON" : "🔕 ALARME: OFF";
        }
    </script>
</body>
</html>
