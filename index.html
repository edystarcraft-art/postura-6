<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Zen Posture Final Fix</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ml5@1.2.1/dist/ml5.min.js"></script>
    <style>
        body { background: #050508; color: #fff; font-family: sans-serif; text-align: center; margin: 0; }
        #canvas-container { margin: 20px auto; border: 3px solid #00ff88; width: 640px; height: 480px; border-radius: 15px; overflow: hidden; }
        .stats { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .card { background: #111122; padding: 15px; border-radius: 10px; min-width: 150px; border-bottom: 4px solid #00ff88; }
        #btn-start { background: #00ff88; border: none; padding: 15px 30px; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>ZEN POSTURE PRO</h1>
    <button id="btn-start" onclick="startApp()">PORNEȘTE ACUM</button>
    <div id="canvas-container"></div>
    
    <div class="stats">
        <div class="card">POSTURĂ: <span id="p-status">---</span></div>
        <div class="card">SCOR: <span id="p-score">0%</span></div>
    </div>

    <script>
        let video;
        let bodyPose;
        let poses = [];
        let okFrames = 0;
        let totalFrames = 0;

        function setup() {
            let cnv = createCanvas(640, 480);
            cnv.parent('canvas-container');
        }

        function startApp() {
            document.getElementById('btn-start').style.display = 'none';
            
            // 1. Inițializează Camera
            video = createCapture(VIDEO, () => {
                console.log("Camera e gata");
                // 2. Inițializează AI-ul abia după ce camera e gata
                bodyPose = ml5.bodyPose(video, () => {
                    console.log("AI gata");
                    bodyPose.detectStart(video, (results) => {
                        poses = results;
                    });
                });
            });
            video.size(640, 480);
            video.hide();
        }

        function draw() {
            background(0);
            
            // Afișează imaginea video manual pentru a fi siguri că apare
            if (video) {
                image(video, 0, 0, 640, 480);
            }

            if (poses.length > 0) {
                let p = poses[0];
                if (p.nose && p.left_shoulder && p.right_shoulder) {
                    totalFrames++;
                    
                    // Calcul postură (nas față de linia umerilor)
                    let shoulderY = (p.left_shoulder.y + p.right_shoulder.y) / 2;
                    let diff = shoulderY - p.nose.y;
                    
                    let isOk = diff > 80;
                    if (isOk) okFrames++;

                    // Update UI
                    document.getElementById('p-status').innerText = isOk ? "CORECTĂ" : "APLECATĂ";
                    document.getElementById('p-status').style.color = isOk ? "#0f8" : "#f44";
                    document.getElementById('p-score').innerText = Math.floor((okFrames/totalFrames)*100) + "%";

                    // Desenează linia umerilor peste video
                    stroke(isOk ? 0, 255, 136 : 255, 68, 68);
                    strokeWeight(8);
                    line(p.left_shoulder.x, p.left_shoulder.y, p.right_shoulder.x, p.right_shoulder.y);
                }
            }
        }
    </script>
</body>
</html>
