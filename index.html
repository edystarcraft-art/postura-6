<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Zen Posture - Functional</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ml5@1.2.1/dist/ml5.min.js"></script>
    <style>
        body { background: #050508; color: #fff; font-family: sans-serif; text-align: center; margin: 0; }
        #btn-start { background: #00ff88; color: #000; border: none; padding: 15px 30px; font-weight: bold; font-size: 1.2rem; border-radius: 5px; cursor: pointer; margin-top: 20px; box-shadow: 0 0 15px rgba(0,255,136,0.5); }
        #status-msg { margin: 15px; font-size: 1.1rem; color: #aaa; font-style: italic; }
        #canvas-container { margin: 0 auto 20px auto; width: 640px; height: 480px; border: 3px solid #333; border-radius: 15px; overflow: hidden; background: #000; }
        .stats { display: flex; justify-content: center; gap: 20px; }
        .card { background: #111122; padding: 15px 25px; border-radius: 10px; border-bottom: 4px solid #333; min-width: 150px; }
        .card.ok { border-bottom-color: #00ff88; }
        .card.bad { border-bottom-color: #ff4444; }
        .val { font-size: 1.5rem; font-weight: bold; margin-top: 5px; }
        .val.ok { color: #00ff88; }
        .val.bad { color: #ff4444; }
    </style>
</head>
<body>
    <h1>ZEN POSTURE PRO</h1>
    
    <button id="btn-start" onclick="pornesteSistemul()">1. DĂ CLICK AICI SĂ PORNEȘTI</button>
    <div id="status-msg">Sistemul așteaptă pornirea...</div>
    
    <div id="canvas-container"></div>
    
    <div class="stats">
        <div class="card" id="card-post">
            <div>POSTURĂ GÂT</div>
            <div id="val-post" class="val">---</div>
        </div>
        <div class="card" id="card-scor">
            <div>SCOR SĂNĂTATE</div>
            <div id="val-scor" class="val">0%</div>
        </div>
    </div>

    <script>
        let video, bodyPose, poses = [];
        let framesOk = 0, framesTotal = 0;

        function setup() {
            let cnv = createCanvas(640, 480);
            cnv.parent('canvas-container');
        }

        function pornesteSistemul() {
            // 1. Ascundem butonul
            document.getElementById('btn-start').style.display = 'none';
            document.getElementById('status-msg').innerText = "2. Se cere acces la cameră...";
            
            // 2. Pornim camera
            video = createCapture(VIDEO, () => {
                document.getElementById('status-msg').innerText = "3. Camera merge! Se descarcă AI-ul (10-20 secunde)...";
                document.getElementById('canvas-container').style.borderColor = "#ffaa00"; // Chenar portocaliu de așteptare
                
                // 3. Pornim AI-ul doar după ce camera e gata
                bodyPose = ml5.bodyPose(() => {
                    document.getElementById('status-msg').innerText = "MONITORIZARE ACTIVĂ ✅";
                    document.getElementById('status-msg').style.color = "#00ff88";
                    document.getElementById('canvas-container').style.borderColor = "#00ff88"; // Chenar verde de succes
                    
                    bodyPose.detectStart(video, (results) => {
                        poses = results;
                    });
                });
            });
            video.size(640, 480);
            video.hide();
        }

        function draw() {
            background(0);
            
            // Afișăm feed-ul video pe ecran
            if (video && video.loadedmetadata) {
                image(video, 0, 0, 640, 480);
            }

            // Calculăm postura
            if (poses.length > 0) {
                let p = poses[0];
                if (p.nose && p.left_shoulder && p.right_shoulder) {
                    framesTotal++;
                    
                    let umeriY = (p.left_shoulder.y + p.right_shoulder.y) / 2;
                    let distanta = umeriY - p.nose.y;
                    
                    let esteCorect = distanta > 80;
                    if (esteCorect) framesOk++;

                    // --- Actualizare Carduri Interfață ---
                    let cardPost = document.getElementById('card-post');
                    let valPost = document.getElementById('val-post');
                    
                    valPost.innerText = esteCorect ? "CORECTĂ" : "APLECATĂ";
                    valPost.className = esteCorect ? "val ok" : "val bad";
                    cardPost.className = esteCorect ? "card ok" : "card bad";
                    
                    document.getElementById('val-scor').innerText = Math.floor((framesOk / framesTotal) * 100) + "%";
                    document.getElementById('val-scor').className = "val ok";

                    // --- Desen pe video ---
                    stroke(esteCorect ? "#00ff88" : "#ff4444");
                    strokeWeight(8);
                    line(p.left_shoulder.x, p.left_shoulder.y, p.right_shoulder.x, p.right_shoulder.y);
                }
            }
        }
    </script>
</body>
</html>
