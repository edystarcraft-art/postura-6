<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Zen Posture Pro - Final Fix</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ml5@1.2.1/dist/ml5.min.js"></script>
    <style>
        body { background: #050508; color: #fff; font-family: sans-serif; text-align: center; margin: 0; }
        .container { display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #btn-start { background: #00ff88; color: #000; border: none; padding: 15px 40px; font-size: 1.2rem; font-weight: bold; border-radius: 50px; cursor: pointer; margin-bottom: 20px; box-shadow: 0 0 15px #00ff88; }
        #v-holder { border: 2px solid #1a1a2e; border-radius: 15px; overflow: hidden; background: #000; width: 640px; height: 480px; }
        .stats { display: flex; gap: 15px; margin-top: 20px; }
        .card { background: #111122; padding: 15px; border-radius: 10px; border-left: 5px solid #00ff88; width: 200px; text-align: left; }
        .card.bad { border-left-color: #ff4444; }
        .val { font-size: 1.2rem; font-weight: bold; color: #00ff88; }
        .val.bad { color: #ff4444; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ZEN POSTURE <span style="color:#0f8">PRO</span></h1>
        <button id="btn-start" onclick="pornesteTotul()">PORNEȘTE CAMERA</button>
        <p id="msg" style="color:#aaa">Așteptare comandă...</p>
        
        <div id="v-holder"></div>
        
        <div class="stats">
            <div class="card" id="c-postura"><div>GÂT</div><div id="v-postura" class="val">---</div></div>
            <div class="card" id="c-dist"><div>DISTANȚĂ</div><div id="v-dist" class="val">---</div></div>
            <div class="card" id="c-scor"><div>SCOR</div><div id="v-scor" class="val">0%</div></div>
        </div>
    </div>

    <script>
        let video, ai, poses = [], tOk = 0, tTot = 0;

        function setup() {
            let cnv = createCanvas(640, 480);
            cnv.parent('v-holder');
        }

        function pornesteTotul() {
            document.getElementById('btn-start').style.display = 'none';
            document.getElementById('msg').innerText = "Se inițializează camera și AI-ul...";
            
            video = createCapture(VIDEO, () => {
                ai = ml5.bodyPose(video, () => {
                    document.getElementById('msg').innerText = "SISTEM ACTIV ✅";
                    ai.detectStart(video, r => { poses = r; });
                });
            });
            video.size(640, 480);
            video.hide();
        }

        function draw() {
            background(0);
            if (video) image(video, 0, 0, 640, 480);
            
            if (poses.length > 0) {
                let p = poses[0];
                if (p.nose && p.left_shoulder && p.right_shoulder && p.left_eye) {
                    let dV = ((p.left_shoulder.y + p.right_shoulder.y) / 2) - p.nose.y;
                    let dO = dist(p.left_eye.x, p.left_eye.y, p.right_eye.x, p.right_eye.y);
                    
                    tTot++;
                    let pOk = dV > 80;
                    let dOk = dO < 55;
                    if (pOk && dOk) tOk++;

                    // Update UI text
                    document.getElementById('v-postura').innerText = pOk ? "CORECT" : "APLECAT";
                    document.getElementById('v-dist').innerText = dOk ? "OPTIM" : "APROAPE";
                    document.getElementById('v-scor').innerText = Math.floor((tOk/tTot)*100) + "%";

                    // Update culori carduri
                    document.getElementById('c-postura').className = pOk ? "card" : "card bad";
                    document.getElementById('c-dist').className = dOk ? "card" : "card bad";

                    // Desen pe video
                    stroke(pOk ? "#0f8" : "#f44");
                    strokeWeight(6);
                    line(p.left_shoulder.x, p.left_shoulder.y, p.right_shoulder.x, p.right_shoulder.y);
                }
            }
        }
    </script>
</body>
</html>
