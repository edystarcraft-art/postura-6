<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Zen Posture Pro - Smart Alerts</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ml5@1.2.1/dist/ml5.min.js"></script>
    <style>
        body { background: #050508; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; margin-bottom: 20px; }
        h1 { color: #00ff88; margin: 0 0 10px 0; text-shadow: 0 0 15px rgba(0,255,136,0.2); letter-spacing: 2px; }
        .controale { display: flex; gap: 10px; justify-content: center; margin-bottom: 10px; flex-wrap: wrap; }
        button { border: none; padding: 12px 20px; font-size: 0.95rem; font-weight: bold; border-radius: 50px; cursor: pointer; transition: 0.3s; }
        #btn-start { background: linear-gradient(135deg, #00ff88, #00cc6e); color: #000; box-shadow: 0 5px 20px rgba(0,255,136,0.3); }
        #btn-audio { background: #333; color: #fff; display: none; }
        #btn-audio.activ { background: #00ff88; color: #000; }
        #btn-pip { background: #00b8ff; color: #000; display: none; box-shadow: 0 5px 20px rgba(0,184,255,0.3); }
        #btn-analytics { background: #ffaa00; color: #000; display: none; box-shadow: 0 5px 20px rgba(255,170,0,0.3); }
        button:hover { transform: scale(1.05); }
        #status-msg { margin-top: 5px; font-size: 1rem; color: #888; font-style: italic; font-weight: bold; }
        .dashboard { display: flex; gap: 30px; flex-wrap: wrap; justify-content: center; max-width: 1000px; width: 100%; }
        #camera-wrapper { border: 2px solid rgba(0, 255, 136, 0.7); box-shadow: 0 0 30px rgba(0, 255, 136, 0.4); border-radius: 20px; overflow: hidden; background: #000; width: 640px; height: 480px; position: relative; }
        #camera-wrapper canvas { display: block; position: relative; z-index: 2; }
        #camera-wrapper video.feed { display: block; width: 640px; height: 480px; position: absolute; top: 0; left: 0; z-index: 1; filter: blur(20px) brightness(0.6); transform: scale(1.1); }
        .panel { display: flex; flex-direction: column; gap: 20px; width: 300px; }
        .card { background: #111122; border-radius: 15px; padding: 25px; border-left: 5px solid #333; box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: 0.3s; }
        .card.ok { border-left-color: #00ff88; }
        .card.bad { border-left-color: #ff4444; background: #1a1122; }
        .lbl { font-size: 0.85rem; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .val { font-size: 1.6rem; font-weight: bold; color: #fff; }
        .val.ok { color: #00ff88; }
        .val.bad { color: #ff4444; }

        /* Modal Analytics */
        #modal-analytics { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5,5,8,0.95); z-index: 999; justify-content: center; align-items: center; }
        .modal-content { background: #111122; border: 2px solid #ffaa00; border-radius: 20px; padding: 30px; width: 90%; max-width: 700px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .modal-content h2 { color: #ffaa00; margin-top: 0; }
        .chart-container { display: flex; justify-content: space-evenly; align-items: flex-end; height: 250px; margin-top: 30px; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .bar-wrapper { display: flex; flex-direction: column; align-items: center; gap: 10px; width: 50px; }
        .bar { width: 100%; background: linear-gradient(0deg, #006633, #00ff88); border-radius: 5px 5px 0 0; transition: height 1s ease-out; }
        .bar.low { background: linear-gradient(0deg, #660000, #ff4444); }
        .bar-label { font-size: 0.8rem; color: #aaa; }
        .bar-score { font-size: 1rem; font-weight: bold; color: #fff; }
        #btn-close-modal { background: #333; color: #fff; margin-top: 30px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>ZEN POSTURE <span style="color:white">PRO</span></h1>
        <div class="controale">
            <button id="btn-start" onclick="initSistem()">1. INIȚIALIZARE SISTEM</button>
            <button id="btn-audio" class="activ" onclick="toggleAudio()">🔔 ALARME: ON</button>
            <button id="btn-pip" onclick="activeazaModFundal()">📺 MOD FUNDAL</button>
            <button id="btn-analytics" onclick="deschideAnalytics()">📊 RAPORT</button>
        </div>
        <div id="status-msg">Apasă butonul pentru a porni AI-ul.</div>
    </div>
    
    <div class="dashboard">
        <div id="camera-wrapper"></div>
        <div class="panel">
            <div class="card" id="c-scor"><div class="lbl">Scor Zilnic</div><div id="v-scor" class="val">0%</div></div>
            <div class="card" id="c-gat"><div class="lbl">Postură Cervicală</div><div id="v-gat" class="val">---</div></div>
            <div class="card" id="c-ochi"><div class="lbl">Distanță Monitor</div><div id="v-ochi" class="val">---</div></div>
        </div>
    </div>

    <video id="pip-video" muted autoplay playsinline style="display:none;"></video>

    <div id="modal-analytics">
        <div class="modal-content">
            <h2>Evoluția Sănătății Tale</h2>
            <div class="chart-container" id="chart-area"></div>
            <button id="btn-close-modal" onclick="inchideAnalytics()">Închide Raportul</button>
        </div>
    </div>

    <script>
        let video, bodyPose, poses = [];
        let cadreCorecte = 0, cadreTotale = 0;
        
        let contextAudio = null;
        let alarmeActive = true;
        let ultimulAvertisment = 0; 
        const COOLDOWN_NOTIFICARE = 5000; 

        const PRAG_POSTURA = 120;  
        const PRAG_DISTANTA = 160; 
        
        let pipVideoElement;
        let dataCurenta = new Date().toLocaleDateString('ro-RO');

        // Variabile pentru noile mesaje vizuale
        let bannerVizual = "";
        let timerBanner = 0;
        let intervalTitluTab = null;

        function setup() {
            let cnv = createCanvas(640, 480);
            cnv.parent('camera-wrapper');
            pipVideoElement = document.getElementById('pip-video');
            pipVideoElement.srcObject = cnv.elt.captureStream(30);
            
            let istoric = JSON.parse(localStorage.getItem('zenPostureHistory'));
            if (!istoric || Object.keys(istoric).length === 0) {
                localStorage.setItem('zenPostureHistory', JSON.stringify({"Luni": 65, "Marți": 72, "Miercuri": 88}));
            }
        }

        function initSistem() {
            document.getElementById('btn-start').style.display = 'none';
            document.getElementById('status-msg').innerText = "Se pregătește sistemul...";

            try {
                window.AudioContext = window.AudioContext || window.webkitAudioContext;
                contextAudio = new AudioContext();
                let silentOsc = contextAudio.createOscillator();
                let silentGain = contextAudio.createGain();
                silentGain.gain.value = 0.0001; 
                silentOsc.connect(silentGain); silentGain.connect(contextAudio.destination);
                silentOsc.start();
            } catch (e) {}
            
            video = createCapture(VIDEO, () => {
                document.getElementById('status-msg').innerText = "Se descarcă AI-ul...";
                video.addClass('feed'); 
                
                bodyPose = ml5.bodyPose(() => {
                    document.getElementById('status-msg').innerText = "SISTEM ACTIV ✅";
                    document.getElementById('status-msg').style.color = "#00ff88";
                    
                    document.getElementById('btn-audio').style.display = 'block'; 
                    document.getElementById('btn-pip').style.display = 'block'; 
                    document.getElementById('btn-analytics').style.display = 'block'; 
                    
                    pipVideoElement.play();
                    bodyPose.detectStart(video, (results) => { poses = results; });
                    setInterval(salveazaProgresul, 5000);
                });
            });
            video.size(640, 480);
            video.hide(); 
        }

        function salveazaProgresul() {
            if (cadreTotale < 50) return; 
            let scorCurent = Math.floor((cadreCorecte / cadreTotale) * 100);
            let istoric = JSON.parse(localStorage.getItem('zenPostureHistory')) || {};
            istoric[dataCurenta] = scorCurent;
            localStorage.setItem('zenPostureHistory', JSON.stringify(istoric));
        }

        function deschideAnalytics() {
            let istoric = JSON.parse(localStorage.getItem('zenPostureHistory')) || {};
            let chartArea = document.getElementById('chart-area');
            chartArea.innerHTML = ""; 
            for (const [ziua, scorul] of Object.entries(istoric)) {
                let clasaCuloare = scorul < 80 ? "bar low" : "bar"; 
                chartArea.innerHTML += `<div class="bar-wrapper"><div class="bar-score">${scorul}%</div><div class="${clasaCuloare}" style="height: ${scorul * 2}px;"></div><div class="bar-label">${ziua === dataCurenta ? "Azi" : ziua}</div></div>`;
            }
            document.getElementById('modal-analytics').style.display = "flex";
        }

        function inchideAnalytics() { document.getElementById('modal-analytics').style.display = "none"; }

        async function activeazaModFundal() {
            try {
                if (document.pictureInPictureElement) await document.exitPictureInPicture();
                else await pipVideoElement.requestPictureInPicture();
            } catch (error) { alert("Folosește o fereastră separată de browser pentru fundal."); }
        }

        // --- NOU: LOGICA PENTRU CLIPEALA TAB-ULUI ---
        function clipesteTitluTab(mesaj) {
            if (intervalTitluTab) return; // Dacă deja clipește, nu mai porni altul
            let titluOriginal = "Zen Posture Pro";
            let arataMesaj = true;
            
            intervalTitluTab = setInterval(() => {
                document.title = arataMesaj ? mesaj : titluOriginal;
                arataMesaj = !arataMesaj;
            }, 800); // Schimbă titlul la fiecare 0.8 secunde

            // Oprește clipeala după 5 secunde
            setTimeout(() => {
                clearInterval(intervalTitluTab);
                intervalTitluTab = null;
                document.title = titluOriginal;
            }, 5000);
        }

        function declanseazaAlarma(tipEroare) {
            if (!alarmeActive) return;
            if (millis() - ultimulAvertisment < COOLDOWN_NOTIFICARE) return; 
            ultimulAvertisment = millis();

            // 1. SETĂM BANNERUL PENTRU CANVAS
            bannerVizual = tipEroare === 'gat' ? "⚠️ ÎNDREAPTĂ SPATELE!" : "🚨 PREA APROAPE DE ECRAN!";
            timerBanner = millis(); // Pornim cronometrul bannerului

            // 2. PORNEȘTE CLIPEALA ÎN TAB
            let mesajTab = tipEroare === 'gat' ? "⚠️ POSTURĂ!" : "🚨 DISTANȚĂ!";
            clipesteTitluTab(mesajTab);

            // 3. SUNETUL (Rămâne ca backup)
            try {
                if (contextAudio && contextAudio.state === 'suspended') contextAudio.resume();
                let oscilator = contextAudio.createOscillator();
                let volum = contextAudio.createGain();
                oscilator.connect(volum); volum.connect(contextAudio.destination);
                oscilator.type = tipEroare === 'gat' ? 'sine' : 'triangle'; 
                oscilator.frequency.value = tipEroare === 'gat' ? 350 : 600; 
                volum.gain.setValueAtTime(0.1, contextAudio.currentTime);
                volum.gain.exponentialRampToValueAtTime(0.001, contextAudio.currentTime + 0.3); 
                oscilator.start(); oscilator.stop(contextAudio.currentTime + 0.3);
            } catch (e) {}
        }

        function toggleAudio() {
            alarmeActive = !alarmeActive;
            let btn = document.getElementById('btn-audio');
            btn.className = alarmeActive ? "activ" : "";
            btn.innerText = alarmeActive ? "🔔 ALARME: ON" : "🔕 ALARME: OFF";
        }

        function draw() {
            background(0);
            if (video && video.loadedmetadata) image(video, 0, 0, 640, 480);

            if (poses.length > 0) {
                let p = poses[0];
                if (p.nose && p.left_shoulder && p.right_shoulder && p.left_eye && p.right_eye) {
                    cadreTotale++;
                    let centruUmeriX = (p.left_shoulder.x + p.right_shoulder.x) / 2;
                    let centruUmeriY = (p.left_shoulder.y + p.right_shoulder.y) / 2;
                    let distantaGat = centruUmeriY - p.nose.y;
                    let gatCorect = distantaGat > PRAG_POSTURA;
                    let distantaOchi = dist(p.left_eye.x, p.left_eye.y, p.right_eye.x, p.right_eye.y);
                    let distantaCorecta = distantaOchi < PRAG_DISTANTA;

                    if (gatCorect && distantaCorecta) cadreCorecte++;

                    if (!gatCorect) declanseazaAlarma('gat');
                    else if (!distantaCorecta) declanseazaAlarma('distanta');

                    let scorCurent = Math.floor((cadreCorecte / cadreTotale) * 100);
                    document.getElementById('v-scor').innerText = scorCurent + "%";
                    document.getElementById('c-scor').className = scorCurent > 80 ? "card ok" : "card bad";
                    document.getElementById('v-scor').className = scorCurent > 80 ? "val ok" : "val bad";

                    document.getElementById('c-gat').className = gatCorect ? "card ok" : "card bad";
                    document.getElementById('v-gat').className = gatCorect ? "val ok" : "val bad";
                    document.getElementById('v-gat').innerText = gatCorect ? "OPTIMĂ" : "APLECAT ⚠️";

                    document.getElementById('c-ochi').className = distantaCorecta ? "card ok" : "card bad";
                    document.getElementById('v-ochi').className = distantaCorecta ? "val ok" : "val bad";
                    document.getElementById('v-ochi').innerText = distantaCorecta ? "SIGURĂ" : "PREA APROAPE 🚨";

                    stroke(gatCorect ? "#00ff88" : "#ff4444"); strokeWeight(6);
                    line(p.left_shoulder.x, p.left_shoulder.y, p.right_shoulder.x, p.right_shoulder.y);

                    stroke(gatCorect ? "#00ff88" : "#ffaa00"); strokeWeight(4);
                    line(p.nose.x, p.nose.y, centruUmeriX, centruUmeriY);

                    noStroke(); fill(255); textSize(24); textStyle(BOLD); textAlign(LEFT);
                    text(Math.floor(distantaGat) + " px", centruUmeriX + 15, centruUmeriY - 20);

                    if (!distantaCorecta) {
                        noFill(); stroke("#ff4444"); strokeWeight(4);
                        ellipse(p.left_eye.x, p.left_eye.y, 40); ellipse(p.right_eye.x, p.right_eye.y, 40);
                    }
                }
            }

            // --- NOU: AFIȘARE BANNER DE ALERTĂ PESTE VIDEO (Pentru PIP Mode) ---
            if (bannerVizual !== "" && millis() - timerBanner < 4000) { // Afișează timp de 4 secunde
                rectMode(CENTER);
                fill(255, 68, 68, 220); // Roșu transparent
                noStroke();
                rect(320, 60, 480, 60, 15); // Dreptunghi rotunjit sus
                
                fill(255);
                textSize(26);
                textAlign(CENTER, CENTER);
                textStyle(BOLD);
                text(bannerVizual, 320, 60);
            }
        }
    </script>
</body>
</html>
